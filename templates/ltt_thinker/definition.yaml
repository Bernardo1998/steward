# Project Definition — defines what this research thinker investigates
#
# This file is the "constitution" of the project. The proactive cycle reads it
# every cycle to stay on track.

project_id: "my_project"
created_at: "2026-01-01T00:00:00Z"

# Optional: force output language (e.g., "chinese" for Chinese output)
# output_language: "chinese"
# output_language_instructions: >
#   ALL output must be in Chinese (简体中文). Technical abbreviations should be
#   explained on first use: "乙型肝炎病毒（HBV）". After first use, abbreviation alone.

goal: >
  [Describe your research goal in 2-4 sentences. Be specific about what
  question you're trying to answer and what "done" looks like.]

scope_boundaries:
  in_scope:
    - "[Topic area 1]"
    - "[Topic area 2]"
    - "[Specific sub-question]"
  out_of_scope:
    - "[Things to explicitly exclude]"
    - "[Adjacent areas that would cause drift]"

success_criteria:
  - "[Concrete deliverable 1 — e.g., structured comparison of >= 5 approaches]"
  - "[Concrete deliverable 2 — e.g., actionable recommendation for X decision]"
  - "[Concrete deliverable 3]"

# Actions — what the runner can do each cycle
actions:
  web_search:
    enabled: true
  # experiment:
  #   enabled: false
  #   repo: "/path/to/experiment/repo"
  #   confidence_threshold: 4
  #   timeout: 600

# Report
report:
  email_prefix: "[MY-PROJECT]"

# Optional: point to a paper vault or other reference sources
# reference_sources:
#   paper_vault: "tasks/paper_reader/vault/papers/"
#   relevant_projects: ["project_a", "project_b"]
#   usage: "Scan at cycle start. Run own searches as needed."
