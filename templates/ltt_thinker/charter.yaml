# Long-Term Thinker — Charter Template
#
# A proactive research agent that tracks a hypothesis over many cycles.
# Copy this folder to your instance: tasks/<project_id>/
# Edit definition.yaml with your research goal and scope.

task_id: "my_research_project"
name: "My Research Project"

# ─── ORCHESTRATOR SECTION ───
schedule:
  frequency: "daily"
  max_runtime_minutes: 60

execution:
  agent: "direct"
  entrypoint: "python run.py"

constraints:
  file_exists:
    - "email_config.yaml"

report:
  digest: true
  own_email:
    enabled: true
    prefix: "[MY-PROJECT]"       # change to your project prefix
    on: "always"
