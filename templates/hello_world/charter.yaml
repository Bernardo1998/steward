# Hello World — minimal charter-worker task
#
# Demonstrates the task contract with zero external dependencies.
# No email, no API keys, no codex — just Python.
#
# To run:
#   cd your_instance/tasks/hello_world && python run.py
#
# Or register in your tasks/registry.yaml and let the orchestrator run it.

task_id: hello_world
name: "Hello World"

schedule:
  frequency: "daily"
  max_runtime_minutes: 1

execution:
  agent: "direct"
  entrypoint: "python run.py"

report:
  digest: true
